<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary, Mom & Dad! ❤️</title>
    <!-- সুন্দর ফন্টের জন্য Google Fonts যুক্ত করা হলো -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 1.5s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        h1 {
            color: #d63031;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .sub-title {
            font-family: 'Pacifico', cursive;
            color: #e84393;
            font-size: 20px;
            margin-bottom: 15px;
        }
        p {
            color: #2d3436;
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 400;
        }
        .image-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 6px solid #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .image-container img:hover {
            transform: scale(1.06);
        }
        .music-btn {
            background: #d63031;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Hind Siliguri', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(214, 48, 49, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .music-btn:hover {
            background: #e84393;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(232, 67, 147, 0.4);
        }
        .hearts {
            color: #d63031;
            font-size: 26px;
            margin-top: 20px;
            animation: beat 0.8s infinite alternate;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes beat {
            to { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>শুভ বিবাহবার্ষিকী</h1>
        <div class="sub-title">Happy Anniversary, Mom & Dad</div>
        <p>তোমাদের এই সুন্দর ভালোবাসা ও বন্ধন আজীবন আমাদের এভাবে আগলে রাখুক। পৃথিবীর শ্রেষ্ঠ বাবা-মায়ের জন্য অনেক অনেক ভালোবাসা ও দোয়া।</p>
        
        <div class="image-container">
            <img src="1000046695.jpg" alt="Mom and Dad">
        </div>

        <!-- ব্যাকগ্রাউন্ড মিউজিক প্লেয়ার -->
        <button class="music-btn" id="playBtn" onclick="toggleMusic()">
            🎵 গানটি চালু করুন
        </button>

        <!-- এখানে একটি সুন্দর কপিরাইট-ফ্রি রিল্যাক্সিং সুরের লিংক দেওয়া আছে -->
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="hearts">❤️❤️❤️❤️</div>
    </div>

    <script>
        var music = document.getElementById("bgMusic");
        var btn = document.getElementById("playBtn");

        function toggleMusic() {
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏸️ গানটি বন্ধ করুন";
            } else {
                music.pause();
                btn.innerHTML = "🎵 গানটি চালু করুন";
            }
        }
    </script>

</body>
</html>
